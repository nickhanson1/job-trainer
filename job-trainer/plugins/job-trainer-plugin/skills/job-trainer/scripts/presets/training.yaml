save_dir: "models_ckpt"

wandb: null
# wandb:
#  entity: "<wandb_entity>"
#  project: "<wandb_project>"

data:
  repeat: 5
  preprocessing: true
  persistent_workers: true
  num_workers: 16

accelerate: false

training:
  epochs: 100
  save_freq: 1
  batch_size: 1024
  mini_batch: 128
  mixing: false
  # model_name: "<model_name>"
  model_spec: "base"
  model_args: {}

  clip_grad: 1.0

  optimizer: "Adam"
  optimizer_args:
    lr: 0.0001

  scheduler: "constant"

  device: "cuda"

  save_hook: null
  finish_hook: null
  evaluate_hook: null
