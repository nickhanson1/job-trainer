data:
  type: "ios_dataset"
  dataset_paths:
    - "dataset"
  num_workers_preprocessing: null
  max_dataset_size: 20000
  # max_dataset_size_test: 2000
  train_test_split: 0.8
  preprocessing: true
  resample: true
  random_split: false
  seq_len: 1
  history_length: 0
  resize:
    h: 160
    w: 320
  augment:
    brightness: 0.1
    contrast: 0.1
    hue: 0.05
    saturation: 0.05
  random_shift: 20
  shift_label: 1
  # FOV: 101.022
  # steering_factor = 640/101.022*45/2 (why divide 2 here)
  steering_factor: 142
  max_augmentation: 130
  # crop_size = 60/101.022*640 = 380
  crop_x: [130, 510]
  crop_y: [140, 330]
